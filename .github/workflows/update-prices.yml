name: Update fuel prices

on:
  schedule:
    # Diario a las 07:30 UTC (≈ 09:30 hora peninsular en horario de verano).
    # MITECO publica precios actualizados varias veces al día; una vez basta.
    - cron: '30 7 * * *'
  workflow_dispatch:        # permite ejecutar manualmente desde la pestaña Actions
  push:
    paths:
      - '.github/scripts/fetch_prices.py'
      - '.github/workflows/update-prices.yml'

permissions:
  contents: write           # necesario para commit & push

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch MITECO prices
        id: fetch
        env:
          # Días que puede tener el último fetch con éxito antes de que el
          # workflow falle en rojo. Editable aquí sin tocar el script.
          STALE_THRESHOLD_DAYS: '3'
        run: python .github/scripts/fetch_prices.py

      - name: Commit updated prices.json
        run: |
          if git diff --quiet -- prices.json; then
            echo "Sin cambios en prices.json — nada que commitear."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git commit -m "chore(prices): actualiza Gasóleo A · surtidor ${{ steps.fetch.outputs.surtidor }} €/l · prof ${{ steps.fetch.outputs.profesional }} €/l (${{ steps.fetch.outputs.estaciones }} estaciones)"
          # Publica reintegrando cambios remotos (evita rechazo del push por
          # carreras con otros commits en main). Hasta 2 intentos: cubre el
          # caso raro de una segunda colisión entre el rebase y el push.
          for attempt in 1 2; do
            if ! git pull --rebase origin main; then
              git rebase --abort || true
              echo "::group::Estado del repo tras conflicto"
              git status --short
              echo "::endgroup::"
              echo "::error::Conflicto al rebasar prices.json — el commit local no se ha publicado"
              exit 1
            fi
            if git push origin HEAD:main; then
              echo "Push correcto (intento $attempt)."
              exit 0
            fi
            echo "::warning::Push rechazado (intento $attempt); reintentando tras rebase."
            if [ "$attempt" -lt 2 ]; then
              sleep 2
            fi
          done
          echo "::error::Push falló tras 2 intentos de rebase+push — el commit local no se ha publicado"
          exit 1
